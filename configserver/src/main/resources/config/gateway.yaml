spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/v1/user/**
            - id: activity-service
              uri: lb://ACTIVITY-SERVICE
              predicates:
                  - Path=/api/v1/activity/**
            - id: ai-service
              uri: lb://AI-SERVICE
              predicates:
                - Path=/api/v1/recommendation/**
#logging:
#  level:
#    org.springframework.cloud.gateway: TRACE
server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/